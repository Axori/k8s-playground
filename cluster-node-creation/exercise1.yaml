# A simple nginx pod to serve HTTP
apiVersion: v1
kind: Pod
metadata:
  name: web
  labels:
    app: web
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80

---
# A curl pod to test pod-to-pod communication from inside the cluster
apiVersion: v1
kind: Pod
metadata:
  name: client
spec:
  containers:
    - name: client
      image: curlimages/curl:latest
      command: ["sleep", "3600"]  # keeps the pod alive so you can exec into it

---
# ClusterIP service — reachable only inside the cluster, by DNS name "web-service"
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80

---
# NodePort service — exposes the pod on every node's IP at port 30080
apiVersion: v1
kind: Service
metadata:
  name: web-nodeport
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
